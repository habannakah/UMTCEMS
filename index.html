<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UMT Club Event Management System</title>
    <!-- Refined Typography: Inter for Body, Plus Jakarta Sans for Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            colors: {
              umt: {
                navy: '#0B1C38',
                light: '#2D58A6',
                accent: '#E68A35',
              },
              surface: {
                50: '#F5F7FA',
                100: '#EAEEF4',
                200: '#D5DFEB',
                300: '#B4C4D8',
                400: '#8DA6C1',
                500: '#6E8AAA',
                600: '#546F90',
                700: '#435A76',
                800: '#384A61',
                900: '#2A3648',
              }
            },
            boxShadow: {
              'soft': '0 2px 8px -2px rgba(11, 28, 56, 0.05), 0 1px 4px -1px rgba(11, 28, 56, 0.03)',
              'elevated': '0 8px 24px -4px rgba(11, 28, 56, 0.08), 0 4px 10px -2px rgba(11, 28, 56, 0.04)',
              'floating': '0 20px 40px -8px rgba(11, 28, 56, 0.12), 0 10px 20px -4px rgba(11, 28, 56, 0.06)',
            },
            transitionTimingFunction: {
              'out-expo': 'cubic-bezier(0.16, 1, 0.3, 1)',
            }
          }
        }
      }
    </script>
    <script>
      document.documentElement.classList.remove('dark');
      document.documentElement.style.colorScheme = 'light';
    </script>
    <style>
      html {
        background-color: #F5F7FA;
        color-scheme: light;
      }
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: transparent;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      h1, h2, h3, h4, h5, h6, .font-display {
        font-family: 'Plus Jakarta Sans', sans-serif;
        letter-spacing: -0.02em;
      }
      /* Custom selection color */
      ::selection {
        background-color: rgba(45, 88, 166, 0.2);
        color: #0B1C38;
      }
    </style>
    <script>
      // Defensive fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && !descriptor.writable && !descriptor.set && descriptor.configurable) {
            Object.defineProperty(window, 'fetch', {
              value: window.fetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // Silently fail if we can't fix it, but at least we tried
        }
      })();
    </script>
</head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
