<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UCEMS - UMT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              umt: { navy: '#ffffff', light: '#ffffff', accent: '#ffffff' },
              slate: { 50: '#ffffff', 100: '#ffffff', 200: '#ffffff', 300: '#ffffff', 400: '#333333', 500: '#333333', 600: '#333333', 700: '#333333', 800: '#333333', 900: '#333333' },
              blue: { 50: '#ffffff', 100: '#ffffff', 200: '#ffffff', 500: '#ffffff', 600: '#ffffff', 700: '#ffffff', 800: '#333333', 900: '#333333' },
              green: { 50: '#ffffff', 100: '#ffffff', 200: '#ffffff', 500: '#ffffff', 600: '#ffffff', 700: '#ffffff', 800: '#333333', 900: '#333333' },
              amber: { 50: '#ffffff', 100: '#ffffff', 200: '#ffffff', 500: '#ffffff', 600: '#ffffff', 700: '#ffffff', 800: '#333333', 900: '#333333' },
              red: { 50: '#ffffff', 100: '#ffffff', 200: '#ffffff', 500: '#ffffff', 600: '#ffffff', 700: '#ffffff', 800: '#333333', 900: '#333333' },
              orange: { 50: '#ffffff', 100: '#ffffff', 200: '#ffffff', 500: '#ffffff', 600: '#ffffff', 700: '#ffffff', 800: '#333333', 900: '#333333' },
              indigo: { 50: '#ffffff', 100: '#ffffff', 200: '#ffffff', 500: '#ffffff', 600: '#ffffff', 700: '#ffffff', 800: '#333333', 900: '#333333' }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Architects Daughter', cursive !important;
        background-color: #ffffff !important;
        background-image: 
          linear-gradient(#e5e5e5 1px, transparent 1px), 
          linear-gradient(90deg, #e5e5e5 1px, transparent 1px) !important;
        background-size: 20px 20px !important;
        color: #333333 !important;
      }
      
      /* Sketchy borders for all containers and interactive elements */
      button, a, input, select, textarea, .bg-white, .bg-slate-50, .bg-blue-50, .bg-green-50, .bg-amber-50, .bg-red-50, .bg-indigo-50, .bg-umt-navy, .bg-indigo-100, .bg-amber-100, .bg-red-100, .bg-green-100, .bg-blue-100, .bg-slate-100, aside, header, .rounded-xl, .rounded-lg, .rounded-full, .rounded-md, .border, table, th, td {
        border: 2px solid #333333 !important;
        border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px !important;
        background-color: #ffffff !important;
        color: #333333 !important;
        box-shadow: none !important;
        text-decoration: none !important;
      }

      /* Hover states for interactive */
      button:hover, a:hover {
        background-color: #f5f5f5 !important;
        transform: scale(1.02);
        transition: all 0.2s ease;
      }

      /* Remove borders from layout wrappers to avoid double borders */
      #root > div, body.bg-slate-50 {
        border: none !important;
        background: transparent !important;
      }

      /* Force text colors */
      h1, h2, h3, h4, h5, h6, p, span, div, label {
        color: #333333 !important;
      }

      /* Icons */
      svg {
        color: #333333 !important;
        stroke-width: 1.5 !important;
      }
      
      /* Hide background colors */
      * {
        box-shadow: none !important;
      }
      
      /* Placeholder text */
      ::placeholder {
        color: #999999 !important;
      }

      /* Crossed out image placeholders if any */
      img {
        border: 2px solid #333 !important;
        border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px !important;
        filter: grayscale(100%) contrast(120%);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
