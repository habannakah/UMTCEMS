<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/umt.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UMT Club Event Management System</title>
    <!-- Refined Typography: Manrope for UI, Fraunces for editorial display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,650;9..144,760&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Manrope', 'sans-serif'],
              display: ['Fraunces', 'serif'],
            },
            colors: {
              umt: {
                navy: '#071B2F',
                light: '#275C8D',
                accent: '#B86B35',
                ink: '#0E1A24',
                paper: '#F6F1E8',
                reed: '#7D8C6A',
              },
              surface: {
                50: '#F5F7FA',
                100: '#EAEEF4',
                200: '#D5DFEB',
                300: '#B4C4D8',
                400: '#8DA6C1',
                500: '#6E8AAA',
                600: '#546F90',
                700: '#435A76',
                800: '#384A61',
                900: '#2A3648',
              }
            },
            boxShadow: {
              'soft': '0 2px 8px -2px rgba(11, 28, 56, 0.05), 0 1px 4px -1px rgba(11, 28, 56, 0.03)',
              'elevated': '0 8px 24px -4px rgba(11, 28, 56, 0.08), 0 4px 10px -2px rgba(11, 28, 56, 0.04)',
              'floating': '0 20px 40px -8px rgba(11, 28, 56, 0.12), 0 10px 20px -4px rgba(11, 28, 56, 0.06)',
            },
            transitionTimingFunction: {
              'out-expo': 'cubic-bezier(0.16, 1, 0.3, 1)',
            }
          }
        }
      }
    </script>
    <script>
      document.documentElement.classList.remove('dark');
      document.documentElement.style.colorScheme = 'light';
    </script>
    <style>
      html {
        background:
          linear-gradient(180deg, rgba(255,255,255,0.72), rgba(246,241,232,0.9) 38%, rgba(245,247,250,0.94)),
          #F6F1E8;
        color-scheme: light;
      }
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background:
          radial-gradient(circle at 18% 10%, rgba(184, 107, 53, 0.09), transparent 26rem),
          linear-gradient(135deg, rgba(7, 27, 47, 0.06), transparent 18rem),
          #F6F1E8;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      #root {
        min-height: 100vh;
      }
      h1, h2, h3, h4, h5, h6, .font-display {
        font-family: 'Fraunces', serif;
        letter-spacing: 0;
      }
      .tracking-tight {
        letter-spacing: 0 !important;
      }
      .tracking-widest {
        letter-spacing: 0.12em;
      }
      .umt-mark {
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18), 0 10px 22px -12px rgba(7, 27, 47, 0.8);
      }
      .paper-grid {
        background-image: url("data:image/svg+xml,%3Csvg width='28' height='28' viewBox='0 0 28 28' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M28 0H0v28' fill='none' stroke='%23071B2F' stroke-opacity='.055'/%3E%3C/svg%3E");
        background-size: 28px 28px;
      }
      .campus-stamp {
        background-image: url("data:image/svg+xml,%3Csvg width='18' height='18' viewBox='0 0 18 18' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='9' cy='9' r='1.8' fill='%23B86B35' fill-opacity='.12'/%3E%3C/svg%3E");
        background-size: 18px 18px;
      }
      :is(button, a, input, textarea, select) {
        -webkit-tap-highlight-color: transparent;
      }
      :is(button, a, input, textarea, select):focus-visible {
        outline: 3px solid rgba(184, 107, 53, 0.28);
        outline-offset: 3px;
      }
      input, textarea, select {
        background-color: rgba(255, 255, 255, 0.88);
        border-color: rgba(7, 27, 47, 0.14);
        color: #0E1A24;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      }
      input:disabled, textarea:disabled, select:disabled {
        background:
          linear-gradient(135deg, rgba(246, 241, 232, 0.72), rgba(245, 247, 250, 0.82));
        color: #546F90;
        border-color: rgba(7, 27, 47, 0.1);
      }
      input:focus, textarea:focus, select:focus {
        background-color: #fff;
        border-color: rgba(39, 92, 141, 0.55);
        box-shadow: 0 0 0 4px rgba(39, 92, 141, 0.09);
      }
      input::placeholder, textarea::placeholder {
        color: #9AA9BA;
      }
      main :is(.bg-white.rounded-xl, .bg-white.rounded-2xl, .bg-white.rounded-lg) {
        border-color: rgba(7, 27, 47, 0.105);
        background-image:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(255,255,255,0.92)),
          linear-gradient(135deg, rgba(184, 107, 53, 0.05), rgba(39, 92, 141, 0.04));
        box-shadow:
          0 20px 46px -34px rgba(7, 27, 47, 0.62),
          0 1px 0 rgba(255, 255, 255, 0.88) inset;
      }
      main :is(.bg-white.rounded-xl, .bg-white.rounded-2xl, .bg-white.rounded-lg):hover {
        border-color: rgba(184, 107, 53, 0.26);
      }
      main table {
        border-collapse: separate;
        border-spacing: 0;
      }
      main :is(th, td) {
        vertical-align: middle;
      }
      main thead tr {
        background:
          linear-gradient(180deg, rgba(246, 241, 232, 0.92), rgba(234, 238, 244, 0.52));
      }
      main thead th {
        color: #435A76;
      }
      main tbody tr {
        transition: background-color 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
      }
      main tbody tr:hover {
        background-color: rgba(246, 241, 232, 0.48);
        box-shadow: inset 3px 0 0 rgba(184, 107, 53, 0.42);
      }
      main :is(button.bg-umt-navy, a.bg-umt-navy) {
        background-image: linear-gradient(180deg, #0B2743, #071B2F);
        box-shadow: 0 14px 26px -16px rgba(7, 27, 47, 0.78), inset 0 1px 0 rgba(255,255,255,0.12);
      }
      main :is(button.bg-umt-navy, a.bg-umt-navy):hover {
        box-shadow: 0 18px 32px -18px rgba(7, 27, 47, 0.9);
      }
      main :is(button, a) {
        transition-property: color, background-color, border-color, box-shadow, transform, opacity;
      }
      .bg-white :is(label, .label-copy) {
        color: #435A76;
      }
      ::-webkit-scrollbar {
        width: 11px;
        height: 11px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(246, 241, 232, 0.75);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(84, 111, 144, 0.42);
        border: 3px solid rgba(246, 241, 232, 0.9);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(39, 92, 141, 0.58);
      }
      [data-scroll-reveal] {
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      }
      [data-scroll-reveal].is-visible {
        opacity: 1;
        transform: translateY(0);
      }
      .scroll-drift {
        animation: scrollDrift 18s linear infinite;
      }
      @keyframes scrollDrift {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 56px 84px;
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        [data-scroll-reveal] {
          opacity: 1;
          transform: none;
          transition: none;
        }
        .scroll-drift {
          animation: none;
        }
      }
      /* Custom selection color */
      ::selection {
        background-color: rgba(45, 88, 166, 0.2);
        color: #0B1C38;
      }
    </style>
    <script>
      // Defensive fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && !descriptor.writable && !descriptor.set && descriptor.configurable) {
            Object.defineProperty(window, 'fetch', {
              value: window.fetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // Silently fail if we can't fix it, but at least we tried
        }
      })();
    </script>
</head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
